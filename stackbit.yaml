stackbitVersion: "~0.6.0"
ssgName: "custom"
nodeVersion: "16"

contentSources:
  - name: git
    label: 内容
    type: git
    rootPath: .
    contentDirs:
      - _data
      - _news
      - _members
      - _publications

models:
  # 数据模型
  homepage:
    type: data
    label: 首页内容
    filePath: _data/homepage.json
    fields:
      - type: image
        name: background_image
        label: 背景图片
        required: true
      - type: string
        name: announcement
        label: 公告信息
      - type: list
        name: slides
        label: 轮播图
        items:
          type: object
          fields:
            - type: image
              name: image
              label: 图片
              required: true
            - type: string
              name: title
              label: 标题
              required: true
            - type: string
              name: description
              label: 描述

  contact:
    type: data
    label: 联系方式
    filePath: _data/contact.json
    fields:
      - type: string
        name: address
        label: 地址
        required: true
      - type: string
        name: email
        label: 邮箱
        required: true
      - type: string
        name: phone
        label: 电话
      - type: string
        name: fax
        label: 传真
      - type: list
        name: social
        label: 社交媒体
        items:
          type: object
          fields:
            - type: string
              name: platform
              label: 平台名称
              required: true
            - type: string
              name: url
              label: 链接
              required: true

  # 内容模型 - 新闻
  news:
    type: page
    label: 新闻
    urlPath: /news/{slug}
    filePath: _news/{slug}.md
    fields:
      - type: string
        name: title
        label: 标题
        required: true
      - type: date
        name: date
        label: 日期
        required: true
      - type: string
        name: description
        label: 描述
      - type: image
        name: thumbnail
        label: 缩略图
      - type: markdown
        name: body
        label: 正文内容
        required: true

  # 内容模型 - 成员
  member:
    type: page
    label: 成员
    urlPath: /members/{slug}
    filePath: _members/{slug}.md
    fields:
      - type: string
        name: name
        label: 姓名
        required: true
      - type: string
        name: position
        label: 职位
        required: true
      - type: image
        name: photo
        label: 照片
      - type: string
        name: bio
        label: 简介
      - type: number
        name: order
        label: 排序
      - type: markdown
        name: body
        label: 详细介绍
        required: true

  # 内容模型 - 出版物
  publication:
    type: page
    label: 出版物
    urlPath: /publications/{slug}
    filePath: _publications/{slug}.md
    fields:
      - type: string
        name: title
        label: 标题
        required: true
      - type: string
        name: authors
        label: 作者
        required: true
      - type: date
        name: date
        label: 日期
        required: true
      - type: string
        name: journal
        label: 期刊
      - type: string
        name: abstract
        label: 摘要
      - type: string
        name: link
        label: 链接
      - type: string
        name: pdf
        label: PDF文件

# 由于我们使用YAML格式，我们需要在JavaScript文件中实现siteMap函数
# 下面是对应的siteMap配置说明
siteMap:
  path: ./stackbit-site-map.js
