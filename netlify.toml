# Netlify 配置文件
[build]
  publish = "."
  command = "# 无需构建命令"

# Stackbit 集成配置
[build.environment]
  STACKBIT_API_KEY = "stackbit"
  STACKBIT_PROJECT_ID = "stackbit"

# 本地测试后端设置
[dev]
  framework = "#static"

# 生成简单的登录认证
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# 添加身份验证模拟
[functions]
  directory = "functions"

# Netlify Bricks 配置
[bricks]
  enabled = true
  site_name = "感知与控制研究所"
  
[bricks.visual_editing]
  enabled = true
  preview_url = "https://www.newipc-zjut.com"

# 头部配置
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Access-Control-Allow-Origin = "*"

# Stackbit 热更新支持
[[plugins]]
  package = "@netlify/plugin-sitemap" 