backend:
  name: git-gateway
  branch: master # 根据您的分支名称调整，可能是master或main

media_folder: "images/uploads" # 媒体文件将存储在网站的哪个目录
public_folder: "/images/uploads" # 上传的媒体文件的公共访问路径

# 启用编辑预览
site_url: https://您的网站域名
display_url: https://您的网站域名
locale: "zh_CN"

collections:
  - name: "news" # 用于网址路由，如 /admin/collections/news
    label: "新闻" # 在UI中显示的名称
    folder: "_news" # 存储内容的文件夹
    create: true # 允许用户创建新文件
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # 文件名模板
    fields: # 字段，即内容的属性
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "概要", name: "description", widget: "text" }
      - { label: "内容", name: "body", widget: "markdown" }
      - { label: "缩略图", name: "thumbnail", widget: "image", required: false }
    view_filters:
      - label: "2023年发布"
        field: date
        pattern: "2023"
      - label: "2024年发布"
        field: date
        pattern: "2024"

  - name: "members"
    label: "团队成员"
    folder: "_members"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "姓名", name: "name", widget: "string" }
      - { label: "职位", name: "position", widget: "string" }
      - { label: "照片", name: "photo", widget: "image", required: false }
      - { label: "简介", name: "bio", widget: "markdown" }
      - { label: "显示顺序", name: "order", widget: "number" }
    sortable_fields: ["order", "name"]

  - name: "publications"
    label: "论文发表"
    folder: "_publications"
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "作者", name: "authors", widget: "string" }
      - { label: "发表日期", name: "date", widget: "datetime" }
      - { label: "期刊/会议", name: "journal", widget: "string" }
      - { label: "摘要", name: "abstract", widget: "text", required: false }
      - { label: "链接", name: "link", widget: "string", required: false }
      - { label: "PDF文件", name: "pdf", widget: "file", required: false }
    view_filters:
      - label: "按年份筛选"
        field: date
        pattern: "202[0-9]"

  - name: "site-settings"
    label: "网站设置"
    files:
      - file: "_data/contact.json"
        label: "联系方式"
        name: "contact-info"
        create: true
        fields:
          - { label: "地址", name: "address", widget: "string" }
          - { label: "邮箱", name: "email", widget: "string" }
          - { label: "电话", name: "phone", widget: "string" }
          - { label: "传真", name: "fax", widget: "string", required: false }
          - label: "社交媒体"
            name: "social"
            widget: "list"
            fields:
              - { label: "平台名称", name: "platform", widget: "string" }
              - { label: "链接", name: "url", widget: "string" }

      - file: "_data/homepage.json"
        label: "首页设置"
        name: "homepage"
        create: true
        fields:
          - { label: "背景图片", name: "background_image", widget: "image" }
          - {
              label: "首页通知",
              name: "announcement",
              widget: "text",
              required: false,
            }
          - label: "首页幻灯片"
            name: "slides"
            widget: "list"
            fields:
              - { label: "图片", name: "image", widget: "image" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "description", widget: "text" }
